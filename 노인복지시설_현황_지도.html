<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap');
:root {
  --navy:#0D1B2A; --navy-mid:#152233;
  --gold:#C8963E; --gold-light:#E8B96A;
  --teal:#2DBFBF; --rose:#E05A6A; --purple:#A78BFA;
  --cream:#F2EDE4; --muted:#7a8fa8; --border:rgba(255,255,255,0.07);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--navy);color:var(--cream);display:flex;flex-direction:column;}

header{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:52px;background:var(--navy-mid);border-bottom:1px solid var(--border);z-index:1000;}
.h-title{font-size:15px;font-weight:700;letter-spacing:-.3px;}
.h-title span{color:var(--gold);}
.h-meta{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;}

.ftype-bar{flex-shrink:0;display:flex;background:var(--navy);border-bottom:1px solid var(--border);z-index:900;}
.ftype-btn{flex:1;height:44px;background:none;border:none;border-bottom:3px solid transparent;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;}
.ftype-btn:hover{color:var(--cream);background:rgba(255,255,255,.03);}
.ftype-btn.active{color:var(--cream);border-bottom-color:var(--gold);background:rgba(200,150,62,.06);}
.ftype-btn .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ftype-btn .cbadge{font-family:'Space Mono',monospace;font-size:10px;padding:2px 7px;border-radius:10px;background:rgba(255,255,255,.06);color:var(--muted);}
.ftype-btn.active .cbadge{background:rgba(200,150,62,.18);color:var(--gold-light);}
.ftype-btn .pin-badge{font-size:9px;padding:2px 6px;border-radius:4px;background:rgba(45,191,191,.2);color:var(--teal);font-family:'Space Mono',monospace;}

.stats-strip{flex-shrink:0;display:flex;background:var(--navy-mid);border-bottom:1px solid var(--border);}
.stat-cell{flex:1;padding:9px 18px;border-right:1px solid var(--border);}
.stat-cell:last-child{border-right:none;}
.sc-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-family:'Space Mono',monospace;}
.sc-val{font-size:20px;font-weight:900;font-family:'Space Mono',monospace;color:var(--gold);line-height:1.1;}
.sc-sub{font-size:10px;color:var(--muted);margin-top:1px;}
.sc-trend{font-size:10px;color:var(--teal);font-family:'Space Mono',monospace;}

.main{flex:1;display:grid;grid-template-columns:1fr 360px;min-height:0;}
#map{width:100%;height:100%;}

/* 카카오 지도 커스텀 스타일 */
.kakao-dot {
  width:14px;height:14px;border-radius:50%;
  border:2px solid rgba(255,255,255,0.9);
  cursor:pointer;
  transition:transform .15s;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
}
.kakao-dot:hover{transform:scale(1.4);}

.kakao-bubble-label {
  font-family:'Noto Sans KR',sans-serif;
  font-size:11px;font-weight:700;
  color:#fff;text-align:center;
  white-space:nowrap;
  text-shadow:0 1px 3px rgba(0,0,0,.8);
  pointer-events:none;
}

.kakao-popup {
  background:rgba(21,34,51,.97);
  border:1px solid rgba(200,150,62,.45);
  border-radius:10px;padding:14px;
  min-width:210px;max-width:260px;
  font-family:'Noto Sans KR',sans-serif;
  box-shadow:0 8px 32px rgba(0,0,0,.6);
  position:relative;
}
.kakao-popup::after {
  content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);
  border:8px solid transparent;border-top-color:rgba(200,150,62,.45);
  border-bottom:none;
}
.cp-title{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid rgba(200,150,62,.2);}
.cp-close{position:absolute;top:10px;right:10px;cursor:pointer;color:var(--muted);font-size:14px;line-height:1;}
.cp-close:hover{color:var(--cream);}
.cp-row{display:flex;justify-content:space-between;margin-bottom:4px;font-size:11px;gap:8px;}
.cp-label{color:var(--muted);flex-shrink:0;}
.cp-val{color:var(--cream);font-weight:600;text-align:right;}

.map-legend{position:absolute;bottom:24px;left:16px;z-index:500;background:rgba(13,27,42,.93);border:1px solid rgba(200,150,62,.3);border-radius:10px;padding:12px 14px;}
.legend-title{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-family:'Space Mono',monospace;margin-bottom:8px;}
.legend-row{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--cream);margin-bottom:5px;}
.legend-row:last-child{margin-bottom:0;}

.side{background:var(--navy-mid);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.side-tabs{flex-shrink:0;display:flex;border-bottom:1px solid var(--border);}
.stab{flex:1;height:38px;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:11px;cursor:pointer;transition:all .2s;}
.stab.active{color:var(--gold);border-bottom-color:var(--gold);background:rgba(200,150,62,.04);}
.side-body{flex:1;overflow-y:auto;padding:14px 12px;}
.sec-label{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-family:'Space Mono',monospace;padding-bottom:8px;margin-bottom:4px;border-bottom:1px solid var(--border);}

.fitem{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:7px;margin-bottom:4px;cursor:pointer;border:1px solid transparent;transition:all .15s;}
.fitem:hover,.fitem.hl{background:rgba(200,150,62,.08);border-color:rgba(200,150,62,.2);}
.fi-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.fi-body{flex:1;min-width:0;}
.fi-name{font-size:12px;font-weight:600;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fi-addr{font-size:10px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fi-meta{display:flex;gap:6px;margin-top:3px;flex-wrap:wrap;}
.fi-tag{font-size:9px;padding:1px 6px;border-radius:3px;font-family:'Space Mono',monospace;}

.ritem{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;margin-bottom:4px;cursor:pointer;border:1px solid transparent;transition:all .15s;}
.ritem:hover{background:rgba(200,150,62,.08);border-color:rgba(200,150,62,.2);}
.rnum{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);width:16px;text-align:center;}
.rname{font-size:13px;font-weight:500;flex:1;}
.rbar-bg{flex:2;height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;}
.rbar{height:100%;border-radius:2px;transition:width .5s ease;}
.rcnt{font-family:'Space Mono',monospace;font-size:11px;color:var(--gold-light);width:36px;text-align:right;}
.rsub{font-size:10px;color:var(--muted);width:60px;text-align:right;}

.chart-wrap{padding:4px 0;}
.trend-summary{margin-top:12px;padding:12px;background:rgba(200,150,62,.04);border-radius:8px;border:1px solid rgba(200,150,62,.12);}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:rgba(200,150,62,.25);border-radius:2px;}
</style>

    <div id="map"></div>

        <canvas id="trendChart"></canvas>
        <div id="trend-summary" class="trend-summary"></div>
      </div>
    </div>
  </div>
</div>

// ── 팝업 생성 ──
function makePopup(lat, lng, html) {
  return new kakao.maps.CustomOverlay({
    position: new kakao.maps.LatLng(lat, lng),
    content: html,
    yAnchor: 1.25,
    zIndex: 10
  });
}

function renderWelfareMap() {
  WELFARE_FACILITIES.forEach(f => {
    const col = TYPE_COLORS[f.type] || '#C8963E';
    const 입주율 = ((f.입주/f.세대)*100).toFixed(1);

    // 점 마커 (CustomOverlay)

    const dotOverlay = new kakao.maps.CustomOverlay({
      position: new kakao.maps.LatLng(f.lat, f.lng),
      content: dotEl,
      zIndex: 5
    });
    dotOverlay.setMap(kakaoMap);
    overlays.push(dotOverlay);

    // 팝업 HTML
    const popupHtml = `
      <div class="kakao-popup">
        <div class="cp-close" onclick="closePopup()">✕</div>
        <div class="cp-title">${f.name}</div>
        <div class="cp-row"><span class="cp-label">위치</span><span class="cp-val">${f.sido} ${f.gu}</span></div>

        <div class="cp-row"><span class="cp-label">분양 세대</span><span class="cp-val">${f.세대.toLocaleString()}세대</span></div>

        <div class="cp-row"><span class="cp-label">설치일</span><span class="cp-val">${f.설치}</span></div>
      </div>`;

    dotEl.onclick = (e) => {
      e.stopPropagation();
      if(openPopup) openPopup.setMap(null);
      openPopup = makePopup(f.lat, f.lng, popupHtml);
      openPopup.setMap(kakaoMap);
    };

    f._overlay = dotOverlay;
  });

  // 지도 클릭 시 팝업 닫기

function renderAggregatedMap(fkey) {
  const fac = AGGREGATED[fkey];
  const maxSi = Math.max(...fac.data.map(d=>d.시설수));

  BASE_REGIONS.forEach((r, i) => {
    const d = fac.data[i];
    const has = d.시설수 > 0;
    const radiusBase = fkey==='care' ? 18000 : 30000;
    const radius = has ? Math.max(d.시설수 * radiusBase / maxSi * 80000, 15000) : 12000;
    const 입소율 = d.정원>0 ? ((d.현원/d.정원)*100).toFixed(1) : '-';

    const circle = new kakao.maps.Circle({
      center: new kakao.maps.LatLng(r.lat, r.lng),
      radius,
      strokeWeight: has ? 1.5 : 1,
      strokeColor: has ? fac.colorLight : '#e05a5a',
      strokeOpacity: has ? 0.8 : 0.3,
      fillColor: has ? fac.color : '#e05a5a',
      fillOpacity: has ? 0.55 : 0.12,
    });
    circle.setMap(kakaoMap);
    circles.push(circle);

    if(has) {
      const labelEl = document.createElement('div');
      labelEl.className = 'kakao-bubble-label';
      labelEl.innerHTML = `${r.name}<br><span style="color:${fac.colorLight};font-family:'Space Mono',monospace;font-size:9px">${d.시설수.toLocaleString()}개</span>`;

      const labelOverlay = new kakao.maps.CustomOverlay({
        position: new kakao.maps.LatLng(r.lat, r.lng),
        content: labelEl,
        zIndex: 5
      });
      labelOverlay.setMap(kakaoMap);
      overlays.push(labelOverlay);

      const popupHtml = `
        <div class="kakao-popup">
          <div class="cp-close" onclick="closePopup()">✕</div>
          <div class="cp-title">${r.name} · ${fac.label}</div>
          <div class="cp-row"><span class="cp-label">시설 수</span><span class="cp-val">${d.시설수.toLocaleString()}개소</span></div>
          <div class="cp-row"><span class="cp-label">정원</span><span class="cp-val">${d.정원.toLocaleString()}명</span></div>
          <div class="cp-row"><span class="cp-label">현원</span><span class="cp-val">${d.현원.toLocaleString()}명</span></div>
          <div class="cp-row"><span class="cp-label">입소율</span><span class="cp-val" style="color:${parseFloat(입소율)>=80?'#2DBFBF':'#C8963E'}">${입소율}%</span></div>
        </div>`;

      labelEl.style.cursor = 'pointer';
      labelEl.onclick = (e) => {
        e.stopPropagation();
        if(openPopup) openPopup.setMap(null);
        openPopup = makePopup(r.lat, r.lng, popupHtml);
        openPopup.setMap(kakaoMap);
      };
      kakao.maps.event.addListener(circle, 'click', () => {
        if(openPopup) openPopup.setMap(null);
        openPopup = makePopup(r.lat, r.lng, popupHtml);
        openPopup.setMap(kakaoMap);
      });
    }
  });

  document.getElementById('map-legend').innerHTML = `
    <div class="legend-title">원 크기 = 시설 수</div>
    <div class="legend-row"><div style="width:22px;height:22px;border-radius:50%;background:${fac.color};opacity:.7;flex-shrink:0"></div><span>많음</span></div>
    <div class="legend-row"><div style="width:12px;height:12px;border-radius:50%;background:${fac.color};opacity:.7;flex-shrink:0"></div><span>적음</span></div>
    <div class="legend-row"><div style="width:10px;height:10px;border-radius:50%;background:#e05a5a;opacity:.5;flex-shrink:0"></div><span>없음</span></div>
  `;
}

            <div class="cp-title">${f.name}</div>
            <div class="cp-row"><span class="cp-label">위치</span><span class="cp-val">${f.sido} ${f.gu}</span></div>
            <div class="cp-row"><span class="cp-label">주소</span><span class="cp-val">${f.addr}</span></div>
            <div class="cp-row"><span class="cp-label">유형</span><span class="cp-val" style="color:${col2}">${f.type}</span></div>
            <div class="cp-row"><span class="cp-label">분양 세대</span><span class="cp-val">${f.세대.toLocaleString()}세대</span></div>
            <div class="cp-row"><span class="cp-label">입주 세대</span><span class="cp-val">${f.입주.toLocaleString()}세대</span></div>
            <div class="cp-row"><span class="cp-label">입주율</span><span class="cp-val" style="color:${parseFloat(pct)>=90?'#2DBFBF':'#C8963E'}">${pct}%</span></div>
            <div class="cp-row"><span class="cp-label">설치일</span><span class="cp-val">${f.설치}</span></div>
          </div>`;
        openPopup = makePopup(f.lat, f.lng, popupHtml);
        openPopup.setMap(kakaoMap);
      };
      pane.appendChild(div);
    });
  });
}

function renderRank(fkey) {
  const pane = document.getElementById('pane-rank');
  if(fkey==='welfare') {
    const bySido = {};
    WELFARE_FACILITIES.forEach(f=>{ bySido[f.sido]=(bySido[f.sido]||0)+1; });
    const sorted = Object.entries(bySido).sort((a,b)=>b[1]-a[1]);
    const maxV = sorted[0][1];
    pane.innerHTML = `<div class="sec-label">시도별 시설 수 · 2024년</div>` +
      sorted.map(([sido,cnt],i)=>{
        const r = BASE_REGIONS.find(r=>r.name===sido);
        return `<div class="ritem" onclick="kakaoMap.setCenter(new kakao.maps.LatLng(${r?.lat||36.5},${r?.lng||127.5}));kakaoMap.setLevel(8)">
          <span class="rnum">${i+1}</span><span class="rname">${sido}</span>
          <div class="rbar-bg"><div class="rbar" style="width:${(cnt/maxV*100).toFixed(0)}%;background:linear-gradient(90deg,#C8963E,#E8B96A)"></div></div>
          <span class="rcnt">${cnt}</span><span class="rsub">개소</span></div>`;
      }).join('');
  } else {
    const fac = AGGREGATED[fkey];
    const merged = BASE_REGIONS.map((r,i)=>({...r,...fac.data[i]})).sort((a,b)=>b.시설수-a.시설수);
    const maxV = merged[0].시설수||1;
    pane.innerHTML = `<div class="sec-label">시도별 시설 수 · 2024년</div>` +
      merged.map((r,i)=>`<div class="ritem" onclick="kakaoMap.setCenter(new kakao.maps.LatLng(${r.lat},${r.lng}));kakaoMap.setLevel(9)">
        <span class="rnum">${i+1}</span><span class="rname">${r.name}</span>
        <div class="rbar-bg"><div class="rbar" style="width:${(r.시설수/maxV*100).toFixed(0)}%;background:linear-gradient(90deg,${fac.color},${fac.colorLight})"></div></div>
        <span class="rcnt">${r.시설수.toLocaleString()}</span>
        <span class="rsub">${r.정원>0?r.정원.toLocaleString()+'명':'—'}</span></div>`).join('');
  }
}

function renderTrend(fkey) {
  if(trendChart){trendChart.destroy();trendChart=null;}
  const td = fkey==='welfare' ? WELFARE_TREND : AGGREGATED[fkey].trend;
  const col = fkey==='welfare'?'#C8963E':fkey==='nursing'?'#2DBFBF':'#A78BFA';
  const ctx = document.getElementById('trendChart').getContext('2d');
  trendChart = new Chart(ctx,{
    type:'line',
    data:{
      labels:td.map(d=>d.year+'년'),
      datasets:[
        {label:fkey==='welfare'?'분양 세대':'정원',data:td.map(d=>d.정원),borderColor:col,backgroundColor:col+'22',fill:true,tension:0.4,pointBackgroundColor:col,pointRadius:5,yAxisID:'y'},
        {label:'시설 수',data:td.map(d=>d.시설수),borderColor:'#E8B96A',fill:false,tension:0.4,pointBackgroundColor:'#E8B96A',pointRadius:5,yAxisID:'y1'}
      ]
    },
    options:{
      responsive:true,interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{labels:{color:'#7a8fa8',font:{family:'Noto Sans KR',size:11},boxWidth:10}},
        tooltip:{backgroundColor:'rgba(13,27,42,.96)',borderColor:'rgba(200,150,62,.3)',borderWidth:1,titleColor:col,bodyColor:'#F2EDE4'}
      },
      scales:{
        x:{ticks:{color:'#7a8fa8',font:{size:10,family:'Space Mono'}},grid:{color:'rgba(255,255,255,.04)'}},
        y:{position:'left',ticks:{color:col,font:{size:9,family:'Space Mono'},callback:v=>v.toLocaleString()},grid:{color:'rgba(255,255,255,.04)'}},
        y1:{position:'right',ticks:{color:'#E8B96A',font:{size:9,family:'Space Mono'}},grid:{drawOnChartArea:false}}
      }
    }
  });
  const summaries={welfare:"시설 수 35 → 43개소 (+22.9%)<br>세대수 7,684 → 9,231세대 (+20.1%)",nursing:"시설 수 232 → 166개소 (-28.4%)<br>정원 13,036 → 9,567명 (-26.6%) ※ 지속 감소",care:"시설 수 3,595 → 4,640개소 (+29.1%)<br>정원 174,015 → 236,365명 (+35.8%) ※ 급증"};
  document.getElementById('trend-summary').innerHTML = `<div style="font-size:9px;color:var(--muted);margin-bottom:6px;font-family:'Space Mono',monospace;">6년간 변화 (2019→2024)</div><div style="font-size:12px;color:var(--cream);line-height:1.8">${summaries[fkey]}</div>`;
}

function switchSide(pane, btn) {
  currentSide = pane;
  document.querySelectorAll('.stab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['list','rank','trend'].forEach(p=>{ document.getElementById('pane-'+p).style.display=p===pane?'block':'none'; });
  if(pane==='trend') renderTrend(currentFacility);
  if(pane==='rank') renderRank(currentFacility);
}

function setFacility(fkey) {
  currentFacility = fkey;
  document.querySelectorAll('.ftype-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+fkey).classList.add('active');
  clearMap();
  const isWelfare = fkey==='welfare';
  const listTab = document.getElementById('stab-list');
  listTab.style.display = isWelfare ? '' : 'none';
  if(!isWelfare && currentSide==='list') {
    currentSide='rank';
    document.querySelectorAll('.stab').forEach(b=>b.classList.remove('active'));
    document.getElementById('stab-rank').classList.add('active');
    ['list','rank','trend'].forEach(p=>{ document.getElementById('pane-'+p).style.display=p==='rank'?'block':'none'; });
  }
  if(isWelfare){ renderWelfareMap(); renderList(); }
  else { renderAggregatedMap(fkey); renderRank(fkey); }
  renderStats(fkey);
  if(currentSide==='rank') renderRank(fkey);
  if(currentSide==='trend') renderTrend(fkey);
}

// INIT
renderWelfareMap();
renderStats('welfare');
renderList();
</script>
</body>
</html>
