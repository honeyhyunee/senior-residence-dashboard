<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>노인복지시설 공급현황 대시보드</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap');
:root{--navy:#0D1B2A;--navy-mid:#152233;--gold:#C8963E;--gold-light:#E8B96A;--teal:#2DBFBF;--purple:#A78BFA;--cream:#F2EDE4;--muted:#7a8fa8;--border:rgba(255,255,255,0.07);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--navy);color:var(--cream);overflow:hidden;}

#header{position:fixed;top:0;left:0;right:0;height:52px;background:var(--navy-mid);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;z-index:1000;}
.h-title{font-size:15px;font-weight:700;}.h-title span{color:var(--gold);}
.h-meta{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;}

#ftype-bar{position:fixed;top:52px;left:0;right:0;height:44px;background:var(--navy);border-bottom:1px solid var(--border);display:flex;z-index:999;}
.ftype-btn{flex:1;height:44px;background:none;border:none;border-bottom:3px solid transparent;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;}
.ftype-btn:hover{color:var(--cream);background:rgba(255,255,255,.03);}
.ftype-btn.active{color:var(--cream);border-bottom-color:var(--gold);background:rgba(200,150,62,.06);}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.cbadge{font-family:'Space Mono',monospace;font-size:10px;padding:2px 7px;border-radius:10px;background:rgba(255,255,255,.06);color:var(--muted);}
.ftype-btn.active .cbadge{background:rgba(200,150,62,.18);color:var(--gold-light);}
.pin-badge{font-size:9px;padding:2px 6px;border-radius:4px;background:rgba(45,191,191,.2);color:var(--teal);font-family:'Space Mono',monospace;}
.opacity-badge{font-size:9px;padding:2px 6px;border-radius:4px;background:rgba(255,255,255,.08);color:var(--muted);font-family:'Space Mono',monospace;}

#stats-strip{position:fixed;top:96px;left:0;right:0;height:58px;background:var(--navy-mid);border-bottom:1px solid var(--border);display:flex;z-index:998;}
.stat-cell{flex:1;padding:8px 18px;border-right:1px solid var(--border);}
.stat-cell:last-child{border-right:none;}
.sc-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-family:'Space Mono',monospace;}
.sc-val{font-size:18px;font-weight:900;font-family:'Space Mono',monospace;color:var(--gold);line-height:1.1;}
.sc-sub{font-size:9px;color:var(--muted);}
.sc-trend{font-size:9px;color:var(--teal);font-family:'Space Mono',monospace;}

#main{position:fixed;top:154px;left:0;right:0;bottom:0;display:grid;grid-template-columns:1fr 360px;}
#map{width:100%;height:100%;}
.leaflet-container{background:#f0f0f0!important;}

.map-legend{position:absolute;bottom:24px;left:16px;z-index:500;background:rgba(13,27,42,.95);border:1px solid rgba(200,150,62,.3);border-radius:10px;padding:14px 16px;min-width:160px;}
.legend-title{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-family:'Space Mono',monospace;margin-bottom:10px;}
.legend-row{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--cream);margin-bottom:7px;}
.legend-row:last-child{margin-bottom:0;}
.legend-opacity-bar{flex:1;height:8px;border-radius:4px;margin:0 4px;}

#side{background:var(--navy-mid);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;height:100%;}
.side-tabs{flex-shrink:0;display:flex;border-bottom:1px solid var(--border);}
.stab{flex:1;height:38px;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:11px;cursor:pointer;transition:all .2s;}
.stab.active{color:var(--gold);border-bottom-color:var(--gold);background:rgba(200,150,62,.04);}
.side-body{flex:1;overflow-y:auto;padding:14px 12px;}
.sec-label{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-family:'Space Mono',monospace;padding-bottom:8px;margin-bottom:4px;border-bottom:1px solid var(--border);}

.fitem{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:7px;margin-bottom:4px;cursor:pointer;border:1px solid transparent;transition:all .15s;}
.fitem:hover,.fitem.hl{background:rgba(200,150,62,.08);border-color:rgba(200,150,62,.2);}
.fi-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.fi-body{flex:1;min-width:0;}
.fi-name{font-size:12px;font-weight:600;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fi-addr{font-size:10px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fi-meta{display:flex;gap:6px;margin-top:3px;flex-wrap:wrap;}
.fi-tag{font-size:9px;padding:1px 6px;border-radius:3px;font-family:'Space Mono',monospace;}

.ritem{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;margin-bottom:4px;cursor:pointer;border:1px solid transparent;transition:all .15s;}
.ritem:hover{background:rgba(200,150,62,.08);border-color:rgba(200,150,62,.2);}
.rnum{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);width:16px;text-align:center;}
.rname{font-size:13px;font-weight:500;flex:1;}
.rbar-bg{flex:2;height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;}
.rbar{height:100%;border-radius:2px;transition:width .5s ease;}
.rcnt{font-family:'Space Mono',monospace;font-size:11px;color:var(--gold-light);width:36px;text-align:right;}
.rsub{font-size:10px;color:var(--muted);width:60px;text-align:right;}

.trend-summary{margin-top:12px;padding:12px;background:rgba(200,150,62,.04);border-radius:8px;border:1px solid rgba(200,150,62,.12);}
.notice-box{margin-bottom:10px;padding:10px 12px;background:rgba(255,255,255,.04);border-radius:8px;border-left:3px solid var(--muted);font-size:11px;color:var(--muted);line-height:1.6;}

.custom-popup{background:rgba(21,34,51,.97);border:1px solid rgba(200,150,62,.4);border-radius:10px;padding:14px;min-width:200px;max-width:250px;font-family:'Noto Sans KR',sans-serif;box-shadow:0 8px 32px rgba(0,0,0,.6);}
.cp-title{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid rgba(200,150,62,.2);}
.cp-row{display:flex;justify-content:space-between;margin-bottom:4px;font-size:11px;gap:8px;}
.cp-label{color:var(--muted);flex-shrink:0;}
.cp-val{color:var(--cream);font-weight:600;text-align:right;}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:rgba(200,150,62,.25);border-radius:2px;}
.leaflet-popup-content-wrapper{background:transparent!important;border:none!important;box-shadow:none!important;padding:0!important;}
.leaflet-popup-tip{display:none!important;}
.leaflet-popup-content{margin:0!important;}
</style>
</head>
<body>

<div id="header">
  <span class="h-title">노인복지시설 <span>공급현황</span> 대시보드</span>
  <span class="h-meta">출처: 2025 노인복지시설 현황 (보건복지부) · 기준: 2024.12.31.</span>
</div>

<div id="ftype-bar">

  </button>
</div>

<div id="stats-strip"></div>

<div id="main">
  <div style="position:relative;height:100%;">
    <div id="map" style="width:100%;height:100%;"></div>
    <div class="map-legend" id="map-legend"></div>
  </div>
  <div id="side">
    <div class="side-tabs">
      <button class="stab active" onclick="switchSide('list',this)" id="stab-list">시설 목록</button>
      <button class="stab" onclick="switchSide('rank',this)" id="stab-rank">시도별 순위</button>
      <button class="stab" onclick="switchSide('trend',this)" id="stab-trend">연도별 추이</button>
    </div>
    <div class="side-body">
      <div id="pane-list"></div>
      <div id="pane-rank" style="display:none"></div>
      <div id="pane-trend" style="display:none">
        <canvas id="trendChart"></canvas>
        <div id="trend-summary" class="trend-summary"></div>
      </div>
    </div>
  </div>
</div>

// hex → rgb 변환
function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

              <span class="fi-tag" style="background:rgba(255,255,255,.06);color:var(--muted)">현원 ${r.현원.toLocaleString()}명</span>
            </div>
            <div style="display:flex;align-items:center;gap:6px;margin-top:5px;">
              <div style="flex:1;height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;">
                <div style="width:${(ratio*100).toFixed(0)}%;height:100%;background:rgba(${rgb},${opacity});border-radius:2px;"></div>
              </div>
              <span style="font-size:9px;color:var(--muted);font-family:'Space Mono',monospace;white-space:nowrap">입소율 <span style="color:${parseFloat(pct)>=80?'#2DBFBF':'#C8963E'}">${pct}%</span> · 전국 ${share}%</span>
            </div>
          </div>`;
        div.onclick=()=>{
          document.querySelectorAll('.fitem').forEach(el=>el.classList.remove('hl'));
          div.classList.add('hl');
          map.setView([r.lat,r.lng],9);
        };
        pane.appendChild(div);
      });

      if(noData.length>0){
        pane.innerHTML+=`<div style="font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;margin:12px 0 6px;padding-bottom:4px;border-bottom:1px solid var(--border);">공급 없는 지역 · ${noData.length}개 시·도</div>`;
        noData.forEach(r=>{
          const div=document.createElement('div');
          div.className='fitem';
          div.style.opacity='0.4';
          div.innerHTML=`
            <div class="fi-dot" style="background:#555;border:1px solid #666;margin-top:4px;"></div>
            <div class="fi-body">
              <div class="fi-name" style="color:var(--muted)">${r.name}</div>
              <div class="fi-addr">시설 없음</div>
            </div>`;
          pane.appendChild(div);
        });
      }
    }
  }

  function renderRankSide(fkey){
    const pane=document.getElementById('pane-rank');
    if(fkey==='welfare'){
      const bySido={};
      WELFARE_FACILITIES.forEach(f=>{bySido[f.sido]=(bySido[f.sido]||0)+1;});
      const sorted=Object.entries(bySido).sort((a,b)=>b[1]-a[1]);
      const maxV=sorted[0][1];
      pane.innerHTML=`<div class="sec-label">시도별 시설 수 · 2024년</div>`+
        sorted.map(([sido,cnt],i)=>{
          const r=BASE_REGIONS.find(r=>r.name===sido);
          return `<div class="ritem" onclick="map.setView([${r?.lat||36.5},${r?.lng||127.5}],11)">
            <span class="rnum">${i+1}</span><span class="rname">${sido}</span>
            <div class="rbar-bg"><div class="rbar" style="width:${(cnt/maxV*100).toFixed(0)}%;background:linear-gradient(90deg,#C8963E,#E8B96A)"></div></div>
            <span class="rcnt">${cnt}</span><span class="rsub">개소</span></div>`;
        }).join('');
    } else {
      const fac=AGGREGATED[fkey];
      const merged=BASE_REGIONS.map((r,i)=>({...r,...fac.data[i]})).sort((a,b)=>b.시설수-a.시설수);
      const maxV=merged[0].시설수||1;
      pane.innerHTML=`<div class="sec-label">시도별 시설 수 · 2024년</div>`+
        merged.map((r,i)=>{
          const ratio=(r.시설수/maxV);
          const rgb=hexToRgb(fac.color);
          return `<div class="ritem" onclick="map.setView([${r.lat},${r.lng}],9)">
            <span class="rnum">${i+1}</span><span class="rname">${r.name}</span>
            <div class="rbar-bg"><div class="rbar" style="width:${(ratio*100).toFixed(0)}%;background:rgba(${rgb},${0.3+ratio*0.7})"></div></div>
            <span class="rcnt">${r.시설수.toLocaleString()}</span>
            <span class="rsub">${r.정원>0?r.정원.toLocaleString()+'명':'—'}</span></div>`;
        }).join('');
    }
  }

  function renderTrend(fkey){
    if(trendChart){trendChart.destroy();trendChart=null;}
    const td=fkey==='welfare'?WELFARE_TREND:AGGREGATED[fkey].trend;
    const col=fkey==='welfare'?'#C8963E':fkey==='nursing'?'#2DBFBF':'#A78BFA';
    const ctx=document.getElementById('trendChart').getContext('2d');
    trendChart=new Chart(ctx,{type:'line',
      data:{labels:td.map(d=>d.year+'년'),datasets:[
        {label:fkey==='welfare'?'분양 세대':'정원',data:td.map(d=>d.정원),borderColor:col,backgroundColor:col+'22',fill:true,tension:0.4,pointBackgroundColor:col,pointRadius:5,yAxisID:'y'},
        {label:'시설 수',data:td.map(d=>d.시설수),borderColor:'#E8B96A',fill:false,tension:0.4,pointBackgroundColor:'#E8B96A',pointRadius:5,yAxisID:'y1'}
      ]},
      options:{responsive:true,interaction:{mode:'index',intersect:false},
        plugins:{legend:{labels:{color:'#7a8fa8',font:{family:'Noto Sans KR',size:11},boxWidth:10}},
          tooltip:{backgroundColor:'rgba(13,27,42,.96)',borderColor:'rgba(200,150,62,.3)',borderWidth:1,titleColor:col,bodyColor:'#F2EDE4'}},
        scales:{x:{ticks:{color:'#7a8fa8',font:{size:10,family:'Space Mono'}},grid:{color:'rgba(255,255,255,.04)'}},
          y:{position:'left',ticks:{color:col,font:{size:9,family:'Space Mono'},callback:v=>v.toLocaleString()},grid:{color:'rgba(255,255,255,.04)'}},
          y1:{position:'right',ticks:{color:'#E8B96A',font:{size:9,family:'Space Mono'}},grid:{drawOnChartArea:false}}}}});
    const summaries={
      welfare:"시설 수 35 → 43개소 (+22.9%)<br>세대수 7,684 → 9,231세대 (+20.1%)",
      nursing:"시설 수 232 → 166개소 (-28.4%)<br>정원 13,036 → 9,567명 (-26.6%) ※ 지속 감소",
      care:"시설 수 3,595 → 4,640개소 (+29.1%)<br>정원 174,015 → 236,365명 (+35.8%) ※ 급증"
    };
    document.getElementById('trend-summary').innerHTML=`
      <div style="font-size:9px;color:var(--muted);margin-bottom:6px;font-family:'Space Mono',monospace;">6년간 변화 (2019→2024)</div>
      <div style="font-size:12px;color:var(--cream);line-height:1.8">${summaries[fkey]}</div>`;
  }

  window.switchSide=function(pane,btn){
    currentSide=pane;
    document.querySelectorAll('.stab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    ['list','rank','trend'].forEach(p=>{document.getElementById('pane-'+p).style.display=p===pane?'block':'none';});
    if(pane==='list')  renderList(currentFacility);
    if(pane==='trend') renderTrend(currentFacility);
    if(pane==='rank')  renderRankSide(currentFacility);
  };

  window.setFacility=function(fkey){
    currentFacility=fkey;
    document.querySelectorAll('.ftype-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('btn-'+fkey).classList.add('active');
    clearMap();

    if(fkey==='welfare'){ renderWelfareMap(); }
    else { renderDensityMap(fkey); }
    renderList(fkey);

    renderStats(fkey);
    if(currentSide==='rank') renderRankSide(fkey);
    if(currentSide==='trend') renderTrend(fkey);
    setTimeout(()=>map.invalidateSize(),100);
  };

  // 초기 렌더
  renderStats('welfare');
  renderWelfareMap();
  renderList('welfare');
};
</script>
</body>
</html>
